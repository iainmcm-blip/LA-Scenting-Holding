<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LA Scenting — Launching Soon</title>
  <meta name="description" content="LA Scenting designs immersive scent identities for extraordinary spaces." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --cream: #EDE9DF;
      --olive: #2D2D23;
      --sand:  #C9AF80;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--olive);
      -webkit-font-smoothing: antialiased;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @supports (height: 100svh) {
      .hero { height: 100svh; }
    }

    video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(45, 45, 35, 0.42);
    }

    .lockup {
      position: relative;
      z-index: 1;
      text-align: center;
      font-family: 'Josefin Sans', sans-serif;
      text-transform: uppercase;
      color: var(--cream);
      letter-spacing: 0.22em;
      user-select: none;
    }

    .lockup__title {
      font-size: clamp(1.75rem, 5vw, 3.75rem);
      font-weight: 300;
      line-height: 1;
    }

    .lockup__title strong {
      font-weight: 700;
    }

    .lockup__gap {
      height: 1.1em;
    }

    .lockup__sub {
      font-size: clamp(0.65rem, 1.4vw, 0.95rem);
      font-weight: 300;
      letter-spacing: 0.38em;
      color: var(--sand);
    }
  </style>
</head>
<body>
  <div class="hero">
    <video id="hero-video" autoplay muted playsinline loop>
      <source src="video/hero.mp4" type="video/mp4" />
    </video>
    <div class="overlay"></div>
    <div class="lockup">
      <p class="lockup__title"><strong>LA</strong> Scenting</p>
      <div class="lockup__gap"></div>
      <p class="lockup__sub">Launching soon</p>
    </div>
  </div>

  <script>
    document.getElementById('hero-video').play().catch(() => {});
  </script>
</body>
</html>
